<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <defs>
    <linearGradient id="axisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#185FA5"/>
      <stop offset="100%" stop-color="#0D3F7F"/>
    </linearGradient>
    <filter id="axisShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Outer ring (glow) -->
  <circle cx="70" cy="70" r="62" fill="none" stroke="#185FA5" stroke-width="1" opacity="0.12"/>
  <!-- Middle ring -->
  <circle cx="70" cy="70" r="56" fill="none" stroke="#185FA5" stroke-width="1.5" opacity="0.25"/>
  <g filter="url(#axisShadow)">
    <!-- Cross/Plus symbol -->
    <line x1="70" y1="28" x2="70" y2="112" stroke="url(#axisGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="28" y1="70" x2="112" y2="70" stroke="url(#axisGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Diagonal lines connecting the 4 points -->
    <line x1="28" y1="70" x2="70" y2="28" stroke="url(#axisGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="70" y1="28" x2="112" y2="70" stroke="url(#axisGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="112" y1="70" x2="70" y2="112" stroke="url(#axisGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="70" y1="112" x2="28" y2="70" stroke="url(#axisGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Center dot with gradient -->
  <circle cx="70" cy="70" r="10" fill="url(#axisGrad)"/>
  <!-- Accent dots at ends -->
  <circle cx="70" cy="28" r="4" fill="#185FA5" opacity="0.6"/>
  <circle cx="70" cy="112" r="4" fill="#185FA5" opacity="0.6"/>
  <circle cx="28" cy="70" r="4" fill="#185FA5" opacity="0.6"/>
  <circle cx="112" cy="70" r="4" fill="#185FA5" opacity="0.6"/>
</svg>
